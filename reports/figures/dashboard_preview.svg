  <circle cx="874" cy="446" r="4" fill="#5b8def"/>
  <circle cx="954" cy="420" r="4" fill="#5b8def"/>
  <circle cx="1016" cy="432" r="4" fill="#5b8def"/>
  <text x="444" y="638" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#7b8394">补充说明：项目里最终更偏重履约体验与复购，因此这里用总体业务图作为首页引导位。</text>

  <text x="1104" y="426" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#2f3547">Core Findings</text>
  <text x="1104" y="476" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2f3547">- Late delivery is a stronger driver of bad reviews</text>
  <text x="1120" y="504" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2f3547">than total delivery duration.</text>
  <text x="1104" y="548" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2f3547">- Olist behaves like a low-frequency marketplace:</text>
  <text x="1120" y="576" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2f3547">30d repeat is only about 1.6%.</text>
  <text x="1104" y="620" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2f3547">- Historical A/B simulation suggests SLA upgrades</text>
  <text x="1120" y="648" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#2f3547">help CX and repeat, but cost guardrails matter.</text>

