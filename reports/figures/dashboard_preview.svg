<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1220" viewBox="0 0 1600 1220" role="img" aria-label="Olist Growth Lab dashboard preview">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="1600" height="1220" fill="#ffffff"/>

  <rect x="0" y="0" width="320" height="1220" fill="#f1f4f9"/>
  <text x="24" y="66" font-family="Helvetica, Arial, sans-serif" font-size="34" font-weight="700" fill="#30354a">Filters</text>

  <text x="24" y="128" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#30354a">Destination region</text>
  <rect x="24" y="146" width="280" height="52" rx="14" fill="#ffffff" stroke="#dce2eb"/>
  <text x="40" y="180" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#30354a">All</text>
  <path d="M272 167 L282 177 L292 167" fill="none" stroke="#4f556a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="24" y="248" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#30354a">Minimum cohort size</text>
  <text x="78" y="286" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#ff4b4b">1000</text>
  <line x1="24" y1="312" x2="304" y2="312" stroke="#d5dbea" stroke-width="6" stroke-linecap="round"/>
  <line x1="24" y1="312" x2="92" y2="312" stroke="#ff4b4b" stroke-width="6" stroke-linecap="round"/>
  <circle cx="92" cy="312" r="10" fill="#ff4b4b"/>

  <rect x="24" y="360" width="104" height="28" rx="8" fill="#ffffff"/>
  <text x="32" y="380" font-family="Menlo, Monaco, monospace" font-size="14" fill="#2a8a3e">30d/60d</text>
  <text x="136" y="380" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#30354a">repeat uses first-order users</text>
  <text x="24" y="412" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#30354a">with a mature observation window.</text>

  <rect x="24" y="460" width="126" height="28" rx="8" fill="#ffffff"/>
  <text x="32" y="480" font-family="Menlo, Monaco, monospace" font-size="14" fill="#2a8a3e">freight / order</text>
  <text x="158" y="480" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#30354a">in the experiment panel is a</text>
  <text x="24" y="512" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#30354a">logistics cost proxy, not full landed cost.</text>

  <text x="420" y="92" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700" fill="#2f3547">Olist Growth Lab</text>
  <text x="420" y="146" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#2f3547">一个面向作品集展示的增长分析 dashboard：把 GMV 趋势、cohort 复购、物流 SLA 与差评/复购关系，</text>
  <text x="420" y="182" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#2f3547">以及历史 A/B 演练结论放在同一页里，方便快速讲清楚业务问题、分析方法和上线建议。</text>

  <g font-family="Helvetica, Arial, sans-serif" filter="url(#softShadow)">
    <rect x="420" y="230" width="268" height="118" rx="18" fill="#ffffff" stroke="#e6eaf1"/>
    <rect x="706" y="230" width="268" height="118" rx="18" fill="#ffffff" stroke="#e6eaf1"/>
    <rect x="992" y="230" width="268" height="118" rx="18" fill="#ffffff" stroke="#e6eaf1"/>
    <rect x="1278" y="230" width="268" height="118" rx="18" fill="#ffffff" stroke="#e6eaf1"/>
  </g>

  <g font-family="Helvetica, Arial, sans-serif">
    <text x="444" y="262" font-size="16" fill="#6a7386">Total GMV</text>
    <text x="444" y="306" font-size="40" font-weight="700" fill="#2f3547">R$ 15.9M</text>
    <text x="444" y="334" font-size="16" fill="#7b8394">99,441 valid orders</text>

    <text x="730" y="262" font-size="16" fill="#6a7386">Avg Daily Orders</text>
    <text x="730" y="306" font-size="40" font-weight="700" fill="#2f3547">157</text>
    <text x="730" y="334" font-size="16" fill="#7b8394">Region: All</text>

    <text x="1016" y="262" font-size="16" fill="#6a7386">30d Repeat</text>
    <text x="1016" y="306" font-size="40" font-weight="700" fill="#2f3547">1.62%</text>
    <text x="1016" y="334" font-size="16" fill="#7b8394">First-order users only</text>

    <text x="1302" y="262" font-size="16" fill="#6a7386">Late Share</text>
    <text x="1302" y="306" font-size="40" font-weight="700" fill="#2f3547">8.01%</text>
    <text x="1302" y="334" font-size="16" fill="#7b8394">Delivered after estimated date</text>
  </g>

