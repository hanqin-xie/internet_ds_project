    <rect x="1080" y="386" width="466" height="270" rx="18" fill="#ffffff" stroke="#e6eaf1"/>
  </g>

  <text x="444" y="426" font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="#2f3547">GMV Trend</text>
  <rect x="444" y="446" width="592" height="168" rx="10" fill="#f8fafc" stroke="#e6eaf1"/>
  <path d="M474 580 L554 548 L634 520 L714 470 L794 488 L874 446 L954 420 L1016 432" fill="none" stroke="#5b8def" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
