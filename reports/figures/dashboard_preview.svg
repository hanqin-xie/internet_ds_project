<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="Olist dashboard preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f9f6ef"/>
      <stop offset="100%" stop-color="#f1eadc"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#173f35"/>
      <stop offset="100%" stop-color="#2f7d65"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#6d5d49" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="220" cy="90" r="180" fill="#e1812e" opacity="0.10"/>
  <circle cx="1260" cy="130" r="160" fill="#2f7d65" opacity="0.12"/>

  <rect x="56" y="42" width="1328" height="148" rx="28" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="92" y="106" font-family="Helvetica, Arial, sans-serif" font-size="38" font-weight="700" fill="#ffffff">Olist Growth &amp; Fulfillment Story</text>
  <text x="92" y="144" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.88)">GMV trend, cohort repeat, SLA diagnostics, and historical A/B recommendation in one portfolio-ready page.</text>

  <g font-family="Helvetica, Arial, sans-serif">
    <rect x="56" y="218" width="306" height="130" rx="22" fill="#fffdf7" stroke="#e7dcc7"/>
    <rect x="384" y="218" width="306" height="130" rx="22" fill="#fffdf7" stroke="#e7dcc7"/>
    <rect x="712" y="218" width="306" height="130" rx="22" fill="#fffdf7" stroke="#e7dcc7"/>
    <rect x="1040" y="218" width="344" height="130" rx="22" fill="#fffdf7" stroke="#e7dcc7"/>

    <text x="82" y="256" font-size="14" fill="#6b655d">TOTAL GMV</text>
    <text x="82" y="304" font-size="40" font-weight="700" fill="#173f35">R$ 15.8M</text>
    <text x="82" y="332" font-size="16" fill="#6b655d">99k valid orders</text>

    <text x="410" y="256" font-size="14" fill="#6b655d">AVG DAILY ORDERS</text>
    <text x="410" y="304" font-size="40" font-weight="700" fill="#173f35">157</text>
    <text x="410" y="332" font-size="16" fill="#6b655d">All regions</text>

    <text x="738" y="256" font-size="14" fill="#6b655d">30D REPEAT</text>
    <text x="738" y="304" font-size="40" font-weight="700" fill="#173f35">1.61%</text>
    <text x="738" y="332" font-size="16" fill="#6b655d">First-order users only</text>

    <text x="1066" y="256" font-size="14" fill="#6b655d">LATE SHARE</text>
    <text x="1066" y="304" font-size="40" font-weight="700" fill="#173f35">8.01%</text>
    <text x="1066" y="332" font-size="16" fill="#6b655d">Delivered after ETA</text>
  </g>

  <rect x="56" y="382" width="800" height="240" rx="24" fill="#fffdf7" stroke="#e7dcc7"/>
  <text x="84" y="420" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#e1812e" font-weight="700">TREND</text>
  <text x="84" y="452" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#173f35" font-weight="700">GMV Momentum</text>
  <path d="M120 554 L250 522 L380 500 L510 430 L640 468 L770 412" fill="none" stroke="#e1812e" stroke-width="5"/>
  <path d="M120 554 L250 522 L380 500 L510 430 L640 468 L770 412" fill="none" stroke="#173f35" stroke-width="0"/>
  <circle cx="120" cy="554" r="5" fill="#173f35"/>
  <circle cx="250" cy="522" r="5" fill="#173f35"/>
  <circle cx="380" cy="500" r="5" fill="#173f35"/>
  <circle cx="510" cy="430" r="5" fill="#173f35"/>
  <circle cx="640" cy="468" r="5" fill="#173f35"/>
  <circle cx="770" cy="412" r="5" fill="#173f35"/>
  <line x1="120" y1="554" x2="790" y2="554" stroke="#e7dcc7" stroke-width="2"/>

  <rect x="880" y="382" width="504" height="240" rx="24" fill="#fffdf7" stroke="#e7dcc7"/>
  <text x="908" y="420" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#e1812e" font-weight="700">STORY</text>
  <text x="908" y="452" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#173f35" font-weight="700">Core Findings</text>
  <text x="908" y="500" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#173f35">Late delivery is a stronger bad-review driver</text>
  <text x="908" y="534" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#173f35">than total delivery duration.</text>
  <text x="908" y="582" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#173f35">Repeat is structurally low, so experiment design</text>
  <text x="908" y="616" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#173f35">should use a two-stage readout.</text>

  <rect x="56" y="652" width="620" height="208" rx="24" fill="#fffdf7" stroke="#e7dcc7"/>
  <text x="84" y="690" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#e1812e" font-weight="700">RETENTION</text>
  <text x="84" y="722" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#173f35" font-weight="700">Cohort Heatmap</text>
  <g>
    <rect x="84" y="748" width="80" height="26" rx="8" fill="#f6efe3"/>
    <rect x="172" y="748" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.84"/>
    <rect x="242" y="748" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.38"/>
    <rect x="312" y="748" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.20"/>
    <rect x="382" y="748" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.14"/>
    <rect x="452" y="748" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.12"/>
  </g>
  <g>
    <rect x="84" y="782" width="80" height="26" rx="8" fill="#f6efe3"/>
    <rect x="172" y="782" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.78"/>
    <rect x="242" y="782" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.32"/>
    <rect x="312" y="782" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.16"/>
    <rect x="382" y="782" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.12"/>
    <rect x="452" y="782" width="62" height="26" rx="8" fill="#2f7d65" opacity="0.10"/>
  </g>

  <rect x="700" y="652" width="684" height="208" rx="24" fill="#fffdf7" stroke="#e7dcc7"/>
  <text x="728" y="690" font-family="Helvetica, Arial, sans-serif" font-size="13" fill="#e1812e" font-weight="700">EXPERIMENT</text>
  <text x="728" y="722" font-family="Helvetica, Arial, sans-serif" font-size="28" fill="#173f35" font-weight="700">Historical A/B Recommendation</text>
  <text x="728" y="768" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#173f35">30d repeat: 1.61% → 1.95%</text>
  <text x="728" y="802" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#173f35">late share: 8.08% → 6.67%</text>
  <text x="728" y="836" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#cb5a39">Guardrail: freight / order worsens</text>
</svg>
